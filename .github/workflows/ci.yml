name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  checks:
    name: Backend + Frontend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
          pip install pytest

      - name: Run API unit tests
        run: python -m pytest tests/test_api_unit_basics.py tests/test_services.py -q

      - name: Compile API sources
        run: python -m compileall apps/api

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Run Web lint
        working-directory: apps/web
        run: npm run lint

      - name: Run Web build
        working-directory: apps/web
        run: npm run build --webpack

  api-smoke:
    name: API Smoke E2E
    runs-on: ubuntu-latest
    needs: checks

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://opentutor:REDACTED_DEV_PASSWORD@127.0.0.1:5432/opentutor
      API_BASE: http://127.0.0.1:8004
      STRICT_LLM: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt

      - name: Prepare database
        run: |
          python - <<'PY'
          import asyncio, asyncpg

          async def main():
              conn = await asyncpg.connect(
                  host="127.0.0.1",
                  port=5432,
                  user="postgres",
                  password="postgres",
                  database="postgres",
                  timeout=10,
              )
              role_exists = await conn.fetchval("SELECT 1 FROM pg_roles WHERE rolname='opentutor'")
              if not role_exists:
                  await conn.execute("CREATE ROLE opentutor WITH LOGIN PASSWORD 'REDACTED_DEV_PASSWORD'")
              db_exists = await conn.fetchval("SELECT 1 FROM pg_database WHERE datname='opentutor'")
              if not db_exists:
                  await conn.execute("CREATE DATABASE opentutor OWNER opentutor")
              await conn.close()

              conn2 = await asyncpg.connect(
                  host="127.0.0.1",
                  port=5432,
                  user="postgres",
                  password="postgres",
                  database="opentutor",
                  timeout=10,
              )
              await conn2.execute("CREATE EXTENSION IF NOT EXISTS vector")
              await conn2.close()

          asyncio.run(main())
          PY

      - name: Prepare upload fixture
        run: |
          cat > /tmp/opentutor_upload_test.md <<'EOF'
          # Unit 1
          ## Topic A
          Notes for CI smoke test.
          EOF

      - name: Start API
        run: |
          cd apps/api
          python -m uvicorn main:app --host 127.0.0.1 --port 8004 > /tmp/opentutor_api.log 2>&1 &
          echo $! > /tmp/opentutor_api.pid
          sleep 3
          curl -f http://127.0.0.1:8004/api/health

      - name: Run API integration tests (pytest)
        run: |
          cd apps/api
          python -m pytest ../../tests/test_api_integration.py -v --timeout=30 || true

      - name: Run strict smoke test
        run: |
          API_BASE=http://127.0.0.1:8004 \
          STRICT_LLM=1 \
          UPLOAD_FILE=/tmp/opentutor_upload_test.md \
          SCRAPE_URL=http://127.0.0.1:8004/api/health \
          bash scripts/smoke_test.sh

      - name: Dump API log on failure
        if: failure()
        run: |
          echo "===== /tmp/opentutor_api.log ====="
          cat /tmp/opentutor_api.log || true

  llm-integration:
    name: Real LLM Integration
    runs-on: ubuntu-latest
    needs: api-smoke
    if: ${{ vars.ENABLE_LLM_TESTS == 'true' }}

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DATABASE_URL: postgresql+asyncpg://opentutor:REDACTED_DEV_PASSWORD@127.0.0.1:5432/opentutor
      API_BASE: http://127.0.0.1:8004

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt

      - name: Prepare database
        run: |
          python - <<'PY'
          import asyncio, asyncpg

          async def main():
              conn = await asyncpg.connect(
                  host="127.0.0.1",
                  port=5432,
                  user="postgres",
                  password="postgres",
                  database="postgres",
                  timeout=10,
              )
              await conn.execute("CREATE ROLE opentutor WITH LOGIN PASSWORD 'REDACTED_DEV_PASSWORD'")
              await conn.execute("CREATE DATABASE opentutor OWNER opentutor")
              await conn.close()

              conn2 = await asyncpg.connect(
                  host="127.0.0.1",
                  port=5432,
                  user="postgres",
                  password="postgres",
                  database="opentutor",
                  timeout=10,
              )
              await conn2.execute("CREATE EXTENSION IF NOT EXISTS vector")
              await conn2.close()

          asyncio.run(main())
          PY

      - name: Start API
        run: |
          cd apps/api
          python -m uvicorn main:app --host 127.0.0.1 --port 8004 > /tmp/opentutor_api.log 2>&1 &
          echo $! > /tmp/opentutor_api.pid
          sleep 3
          curl -f http://127.0.0.1:8004/api/health

      - name: Run real LLM integration test
        run: bash scripts/llm_integration_test.sh

      - name: Dump API log on failure
        if: failure()
        run: |
          echo "===== /tmp/opentutor_api.log ====="
          cat /tmp/opentutor_api.log || true
