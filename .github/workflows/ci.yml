name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  checks:
    name: Backend + Frontend Checks
    runs-on: ubuntu-latest
    env:
      DISABLE_RATE_LIMIT: "1"
      CODE_SANDBOX_BACKEND: process

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
          pip install pytest

      - name: Run API unit tests
        run: python -m pytest tests/test_api_unit_basics.py tests/test_services.py tests/test_agent_runtime_regressions.py tests/test_code_execution_agent.py tests/test_eval_regressions.py tests/test_ingestion_regressions.py tests/test_canvas_parser.py tests/test_canvas_router_unit.py tests/test_scrape_services.py tests/test_scrape_router_unit.py -q

      - name: Run Offline Regression Benchmark
        working-directory: apps/api
        run: |
          python - <<'PY'
          import asyncio, json, sys
          from services.evaluation.benchmark_runner import run_regression_benchmark

          result = asyncio.run(run_regression_benchmark())
          print(json.dumps(result, indent=2))
          if not result["passed"]:
              sys.exit(1)
          PY

      - name: Compile API sources
        run: python -m compileall apps/api

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json

      - name: Install Root runner dependencies
        run: npm ci

      - name: Install Web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Run Web lint
        working-directory: apps/web
        run: npm run lint

      - name: Run Web build
        working-directory: apps/web
        run: npm run build

      - name: Generate host-safe verification summary
        run: bash scripts/dev_local.sh verify-host

      - name: Gate host-safe verification summary
        run: |
          python scripts/validate_verification_summary.py \
            tmp/verification-summary.json \
            --allow-skip "DB-backed integration spot check" \
            --allow-skip "Stack smoke/regression"

      - name: Upload verification summaries
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: verification-summary
          path: |
            tmp/verification-summary.md
            tmp/verification-summary.json
          if-no-files-found: error

  api-smoke:
    name: API Smoke E2E
    runs-on: ubuntu-latest
    needs: checks

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://opentutor:REDACTED_DEV_PASSWORD@127.0.0.1:5432/opentutor
      API_BASE: http://127.0.0.1:8004
      STRICT_LLM: "1"
      DISABLE_RATE_LIMIT: "1"
      CODE_SANDBOX_BACKEND: process
      APP_AUTO_CREATE_TABLES: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
          pip install pytest pytest-timeout

      - name: Prepare database
        run: python scripts/setup_ci_db.py

      - name: Prepare upload fixture
        run: |
          cat > /tmp/opentutor_upload_test.md <<'EOF'
          # Unit 1
          ## Topic A
          Notes for CI smoke test.
          EOF

      - name: Start API
        run: |
          cd apps/api
          python -m uvicorn main:app --host 127.0.0.1 --port 8004 > /tmp/opentutor_api.log 2>&1 &
          echo $! > /tmp/opentutor_api.pid
          sleep 3
          curl -f http://127.0.0.1:8004/api/health

      - name: Run API integration tests (pytest)
        run: |
          cd apps/api
          python -m pytest ../../tests/test_api_integration.py -v --timeout=30

      - name: Run API regression benchmark gate
        run: |
          course_resp=$(curl -sS -X POST http://127.0.0.1:8004/api/courses/ \
            -H 'Content-Type: application/json' \
            --data '{"name":"Regression Eval Course","description":"fixture"}')
          echo "$course_resp" > /tmp/opentutor_eval_course.json
          python - <<'PY'
          import json
          course = json.load(open("/tmp/opentutor_eval_course.json"))
          open("/tmp/opentutor_eval_course_id.txt", "w", encoding="utf-8").write(course["id"])
          PY
          COURSE_ID=$(cat /tmp/opentutor_eval_course_id.txt)
          curl -sS -X POST http://127.0.0.1:8004/api/content/upload \
            -F "course_id=$COURSE_ID" \
            -F "file=@/tmp/opentutor_upload_test.md;type=text/markdown" \
            > /tmp/opentutor_eval_upload.json
          python - <<'PY'
          import json
          course_id = open("/tmp/opentutor_eval_course_id.txt", encoding="utf-8").read().strip()
          payload = {
              "course_id": course_id,
              "retrieval_queries": [
                  {
                      "query": "topic A notes",
                      "keywords": ["Topic A", "Unit 1"],
                  }
              ],
          }
          json.dump(payload, open("/tmp/opentutor_regression_payload.json", "w", encoding="utf-8"))
          PY
          curl -sS -X POST http://127.0.0.1:8004/api/eval/regression \
            -H 'Content-Type: application/json' \
            --data @/tmp/opentutor_regression_payload.json > /tmp/opentutor_regression.json
          cat /tmp/opentutor_regression.json
          python - <<'PY'
          import json, sys
          data = json.load(open("/tmp/opentutor_regression.json"))
          if not data.get("passed"):
              sys.exit(1)
          PY

      - name: Run strict smoke test
        run: |
          API_BASE=http://127.0.0.1:8004 \
          STRICT_LLM=1 \
          UPLOAD_FILE=/tmp/opentutor_upload_test.md \
          bash scripts/smoke_test.sh

      - name: Dump API log on failure
        if: failure()
        run: |
          echo "===== /tmp/opentutor_api.log ====="
          cat /tmp/opentutor_api.log || true

  e2e-ui:
    name: Browser E2E (All Specs)
    runs-on: ubuntu-latest
    needs: api-smoke

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://opentutor:REDACTED_DEV_PASSWORD@127.0.0.1:5432/opentutor
      PYTHON_BIN: python
      DISABLE_RATE_LIMIT: "1"
      APP_AUTO_CREATE_TABLES: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt

      - name: Prepare database
        run: python scripts/setup_ci_db.py

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json

      - name: Install Playwright runner deps
        run: npm ci

      - name: Install Web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run browser E2E (all specs)
        run: npx playwright test --project=chromium --reporter=github --ignore-snapshots

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  llm-integration:
    name: Real LLM Integration
    runs-on: ubuntu-latest
    needs: e2e-ui
    if: ${{ vars.ENABLE_LLM_TESTS == 'true' }}

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      DATABASE_URL: postgresql+asyncpg://opentutor:REDACTED_DEV_PASSWORD@127.0.0.1:5432/opentutor
      API_BASE: http://127.0.0.1:8004
      LLM_REQUIRED: "1"
      PYTHON_BIN: python
      APP_AUTO_CREATE_TABLES: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json

      - name: Install Playwright runner deps
        run: npm ci

      - name: Install Web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Prepare database
        run: python scripts/setup_ci_db.py

      - name: Start API
        run: |
          cd apps/api
          LLM_REQUIRED=1 python -m uvicorn main:app --host 127.0.0.1 --port 8004 > /tmp/opentutor_api.log 2>&1 &
          echo $! > /tmp/opentutor_api.pid
          sleep 3
          curl -f http://127.0.0.1:8004/api/health

      - name: Run real LLM integration test
        run: bash scripts/llm_integration_test.sh

      - name: Run real LLM browser E2E
        run: npx playwright test tests/e2e/llm-real.spec.ts --project=chromium --reporter=github

      - name: Dump API log on failure
        if: failure()
        run: |
          echo "===== /tmp/opentutor_api.log ====="
          cat /tmp/opentutor_api.log || true
