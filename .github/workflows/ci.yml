name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  checks:
    name: Backend + Frontend Checks
    runs-on: ubuntu-latest
    env:
      DISABLE_RATE_LIMIT: "1"
      CODE_SANDBOX_BACKEND: process

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            apps/api/requirements-core.txt
            apps/api/requirements-full.txt

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements-full.txt
          pip install pytest

      - name: Audit Python dependencies
        run: pip install pip-audit && pip-audit --desc --skip-editable

      - name: Run API unit tests
        run: |
          python -m pytest tests -q

      - name: Check CI/local gate consistency
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          pytest_ini = Path("pytest.ini").read_text(encoding="utf-8")
          ci_workflow = Path(".github/workflows/ci.yml").read_text(encoding="utf-8")

          cov_match = re.search(r"--cov-fail-under=(\d+)", pytest_ini)
          if cov_match is None:
              raise SystemExit("pytest.ini missing --cov-fail-under")
          if int(cov_match.group(1)) < 45:
              raise SystemExit("coverage gate must be >=45 for this beta phase")

          api_tests_section = re.search(
              r"- name:\s*Run API unit tests(?P<body>.*?)(?:\n\s*-\s+name:|\Z)",
              ci_workflow,
              flags=re.S,
          )
          if api_tests_section is None:
              raise SystemExit("missing Run API unit tests step")
          if "-o addopts=" in api_tests_section.group("body"):
              raise SystemExit("Run API unit tests step cannot bypass addopts")

          print("CI/local gate consistency check passed.")
          PY

      - name: Run Offline Regression Benchmark
        working-directory: apps/api
        run: |
          python - <<'PY'
          import asyncio, json, sys
          from services.evaluation.benchmark_runner import run_regression_benchmark

          result = asyncio.run(run_regression_benchmark())
          print(json.dumps(result, indent=2))
          if not result["passed"]:
              sys.exit(1)
          PY

      - name: Validate Alembic migrations
        working-directory: apps/api
        env:
          DATABASE_URL: sqlite+aiosqlite:////tmp/opentutor-ci-alembic.db
          APP_AUTO_CREATE_TABLES: "false"
        run: |
          python -m alembic upgrade head
          python -c "
          from alembic.config import Config
          from alembic.script import ScriptDirectory
          cfg = Config('alembic.ini')
          scripts = ScriptDirectory.from_config(cfg)
          heads = scripts.get_heads()
          print(f'Migration heads: {heads}')
          if len(heads) != 1:
              raise SystemExit(f'Expected 1 migration head, found {len(heads)}: {heads}')
          print('Alembic migration validation passed.')
          "

      - name: Compile API sources
        run: python -m compileall -q -x '/\.venv/' apps/api

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json

      - name: Install Root runner dependencies
        run: npm ci

      - name: Install Web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Run Web lint
        working-directory: apps/web
        run: npm run lint

      - name: Security audit
        run: npm audit --audit-level=high || true
        working-directory: apps/web

      - name: Run Web unit tests
        working-directory: apps/web
        run: npx vitest run --reporter=github-actions

      - name: Run Web build
        working-directory: apps/web
        run: npm run build

      - name: Generate host-safe verification summary
        run: bash scripts/dev_local.sh verify-host --ci-parity

      - name: Gate host-safe verification summary
        run: |
          python scripts/validate_verification_summary.py \
            tmp/verification-summary.json \
            --allow-skip "Stack smoke/regression"

      - name: Upload verification summaries
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: verification-summary
          path: |
            tmp/verification-summary.md
            tmp/verification-summary.json
          if-no-files-found: error

  api-smoke:
    name: API Smoke E2E
    runs-on: ubuntu-latest
    needs: checks

    env:
      DATABASE_URL: sqlite+aiosqlite:////tmp/opentutor-ci-smoke.db
      API_BASE: http://127.0.0.1:8004
      STRICT_LLM: "1"
      LLM_PROVIDER: custom
      CUSTOM_LLM_BASE_URL: http://127.0.0.1:18081/v1
      CUSTOM_LLM_MODEL: mock-smoke-model
      DISABLE_RATE_LIMIT: "1"
      CODE_SANDBOX_BACKEND: process
      APP_AUTO_CREATE_TABLES: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            apps/api/requirements-core.txt
            apps/api/requirements-full.txt

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements-full.txt
          pip install pytest pytest-timeout

      - name: Prepare upload fixture
        run: |
          cat > /tmp/opentutor_upload_test.md <<'EOF'
          # Unit 1
          ## Topic A
          Notes for CI smoke test.
          EOF

      - name: Start mock LLM API
        run: |
          python scripts/mock_openai_server.py --host 127.0.0.1 --port 18081 --model mock-smoke-model > /tmp/opentutor_mock_llm.log 2>&1 &
          echo $! > /tmp/opentutor_mock_llm.pid
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:18081/v1/models && break
            echo "Waiting for mock LLM API... attempt $i"
            sleep 1
          done
          curl -f http://127.0.0.1:18081/v1/models

      - name: Start API
        run: |
          cd apps/api
          python -m uvicorn main:app --host 127.0.0.1 --port 8004 > /tmp/opentutor_api.log 2>&1 &
          echo $! > /tmp/opentutor_api.pid
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8004/api/health && break
            echo "Waiting for API... attempt $i"
            sleep 2
          done
          curl -f http://127.0.0.1:8004/api/health

      - name: Run SQLite integration tests (pytest)
        run: |
          cd apps/api
          python -m pytest ../../tests/test_sqlite_mode.py -v --timeout=30 -o addopts=

      - name: Run strict smoke test
        run: |
          API_BASE=http://127.0.0.1:8004 \
          STRICT_LLM=1 \
          UPLOAD_FILE=/tmp/opentutor_upload_test.md \
          bash scripts/smoke_test.sh

      - name: Dump API log on failure
        if: failure()
        run: |
          echo "===== /tmp/opentutor_api.log ====="
          cat /tmp/opentutor_api.log || true

      - name: Dump mock LLM log on failure
        if: failure()
        run: |
          echo "===== /tmp/opentutor_mock_llm.log ====="
          cat /tmp/opentutor_mock_llm.log || true

  e2e-ui:
    name: Browser E2E (All Specs)
    runs-on: ubuntu-latest
    needs: api-smoke

    env:
      DATABASE_URL: sqlite+aiosqlite:////tmp/opentutor-ci-e2e.db
      PYTHON_BIN: python
      DISABLE_RATE_LIMIT: "1"
      APP_AUTO_CREATE_TABLES: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            apps/api/requirements-core.txt
            apps/api/requirements-full.txt

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements-full.txt

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json

      - name: Install Playwright runner deps
        run: npm ci

      - name: Install Web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run browser E2E (all specs)
        run: npx playwright test --project=chromium --reporter=github --ignore-snapshots

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  llm-integration:
    name: Real LLM Integration
    runs-on: ubuntu-latest
    needs: e2e-ui
    if: ${{ vars.ENABLE_LLM_TESTS == 'true' }}

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      DATABASE_URL: sqlite+aiosqlite:////tmp/opentutor-ci-llm.db
      API_BASE: http://127.0.0.1:8004
      LLM_REQUIRED: "1"
      PYTHON_BIN: python
      APP_AUTO_CREATE_TABLES: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            apps/api/requirements-core.txt
            apps/api/requirements-full.txt

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements-full.txt

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json

      - name: Install Playwright runner deps
        run: npm ci

      - name: Install Web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start API
        run: |
          cd apps/api
          LLM_REQUIRED=1 python -m uvicorn main:app --host 127.0.0.1 --port 8004 > /tmp/opentutor_api.log 2>&1 &
          echo $! > /tmp/opentutor_api.pid
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8004/api/health && break
            echo "Waiting for API... attempt $i"
            sleep 2
          done
          curl -f http://127.0.0.1:8004/api/health

      - name: Run real LLM integration test
        run: bash scripts/llm_integration_test.sh

      - name: Run real LLM browser E2E
        run: npx playwright test tests/e2e/llm-real.spec.ts --project=chromium --reporter=github

      - name: Dump API log on failure
        if: failure()
        run: |
          echo "===== /tmp/opentutor_api.log ====="
          cat /tmp/opentutor_api.log || true
