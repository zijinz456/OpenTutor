# MCP Server Configuration
#
# Define external MCP servers that provide additional tools.
# Tools from MCP servers are automatically discovered and registered
# into the agent's tool registry at startup.
#
# Transport types:
#   stdio: Launch subprocess, communicate via stdin/stdout JSON-RPC
#   sse:   Connect to HTTP SSE endpoint (not yet implemented)
#
# Environment variables: Use ${VAR_NAME} syntax to reference env vars.
#
# Example:
#
# servers:
#   - name: web-search
#     transport: stdio
#     command: python3
#     args: ["-m", "mcp_servers.web_search"]
#     env:
#       SERPER_API_KEY: ${SERPER_API_KEY}
#
#   - name: file-manager
#     transport: sse
#     url: http://localhost:8100/sse

servers: []
