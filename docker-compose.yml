version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg17
    container_name: opentutor-db
    environment:
      POSTGRES_USER: opentutor
      POSTGRES_PASSWORD: REDACTED_DEV_PASSWORD
      POSTGRES_DB: opentutor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opentutor"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: opentutor-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: opentutor-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://opentutor:REDACTED_DEV_PASSWORD@db:5432/opentutor
      REDIS_URL: redis://redis:6379/0
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-single_user}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_REQUIRED: ${LLM_REQUIRED:-false}
      APP_AUTO_CREATE_TABLES: ${APP_AUTO_CREATE_TABLES:-false}
      APP_AUTO_SEED_SYSTEM: ${APP_AUTO_SEED_SYSTEM:-false}
      APP_RUN_SCHEDULER: ${APP_RUN_SCHEDULER:-false}
      APP_RUN_ACTIVITY_ENGINE: ${APP_RUN_ACTIVITY_ENGINE:-false}
      CODE_SANDBOX_BACKEND: ${CODE_SANDBOX_BACKEND:-container}
      CODE_SANDBOX_RUNTIME: ${CODE_SANDBOX_RUNTIME:-docker}
      CODE_SANDBOX_IMAGE: ${CODE_SANDBOX_IMAGE:-python:3.11-alpine}
      ALLOW_INSECURE_PROCESS_SANDBOX: ${ALLOW_INSECURE_PROCESS_SANDBOX:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      UPLOAD_DIR: /app/uploads
      SCRAPE_FIXTURE_DIR: /fixtures/e2e/scrape
    volumes:
      - ./apps/api:/app
      - ./tests/e2e/fixtures:/fixtures/e2e:ro
      - uploads:/app/uploads
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: bash -lc "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    container_name: opentutor-web
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  uploads:
