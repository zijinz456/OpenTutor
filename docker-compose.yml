services:
  redis:
    image: redis:7.4-alpine
    container_name: opentutor-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      args:
        PYTHON_REQUIREMENTS: ${API_PYTHON_REQUIREMENTS:-requirements-core.txt}
    container_name: opentutor-api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    security_opt:
      - no-new-privileges:true
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/opentutor.db
      REDIS_URL: redis://redis:6379/0
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-single_user}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      OLLAMA_BASE_URL: ${DOCKER_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      LMSTUDIO_BASE_URL: ${DOCKER_LMSTUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      VLLM_BASE_URL: ${DOCKER_VLLM_BASE_URL:-http://host.docker.internal:8000/v1}
      TEXTGENWEBUI_BASE_URL: ${DOCKER_TEXTGENWEBUI_BASE_URL:-http://host.docker.internal:5000/v1}
      LLM_REQUIRED: ${LLM_REQUIRED:-false}
      APP_AUTO_CREATE_TABLES: ${APP_AUTO_CREATE_TABLES:-true}
      APP_AUTO_SEED_SYSTEM: ${APP_AUTO_SEED_SYSTEM:-true}
      APP_RUN_SCHEDULER: ${APP_RUN_SCHEDULER:-false}
      APP_RUN_ACTIVITY_ENGINE: ${APP_RUN_ACTIVITY_ENGINE:-false}
      CODE_SANDBOX_BACKEND: ${CODE_SANDBOX_BACKEND:-container}
      CODE_SANDBOX_RUNTIME: ${CODE_SANDBOX_RUNTIME:-docker}
      CODE_SANDBOX_IMAGE: ${CODE_SANDBOX_IMAGE:-python:3.11-alpine}
      ALLOW_INSECURE_PROCESS_SANDBOX: ${ALLOW_INSECURE_PROCESS_SANDBOX:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001,http://127.0.0.1:3001}
      SERVE_BUILTIN_UI: "false"
      UPLOAD_DIR: /app/uploads
      SCRAPE_FIXTURE_DIR: /fixtures/e2e/scrape
    volumes:
      - ./apps/api:/app
      - ./tests/e2e/fixtures:/fixtures/e2e:ro
      - uploads:/app/uploads
      - sqlite_data:/app/data
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    container_name: opentutor-web
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    security_opt:
      - no-new-privileges:true
    ports:
      - "${WEB_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3001 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      api:
        condition: service_healthy

volumes:
  redisdata:
  uploads:
  sqlite_data:
