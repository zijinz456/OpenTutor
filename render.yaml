# Render Blueprint — one-click deploy for OpenTutor
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: opentutor-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    disk:
      name: opentutor-data
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////var/data/opentutor.db
      - key: APP_AUTO_CREATE_TABLES
        value: "true"
      - key: APP_AUTO_SEED_SYSTEM
        value: "true"
      - key: APP_RUN_SCHEDULER
        value: "true"
      - key: APP_RUN_ACTIVITY_ENGINE
        value: "true"
      - key: ENVIRONMENT
        value: production
      - key: AUTH_ENABLED
        value: "true"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: LLM_PROVIDER
        sync: false  # Set your LLM provider (ollama, openai, deepseek, etc.)
      - key: LLM_MODEL
        sync: false  # Set your model name (e.g., deepseek-chat, gpt-4o-mini)
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: opentutor-web
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: opentutor-web
    runtime: docker
    dockerfilePath: apps/web/Dockerfile
    dockerContext: .
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: opentutor-api
          envVarKey: RENDER_EXTERNAL_URL
