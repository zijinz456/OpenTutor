      <h1>Binary Search Notes</h1>
      <p>Binary search works on sorted data by repeatedly halving the candidate range.</p>
      <h2>Invariant</h2>
      <p>At each step, the target can only remain in one half of the interval.</p>
      <h2>Common Mistakes</h2>
      <ul>
        <li>Using binary search on unsorted arrays.</li>
        <li>Updating bounds with the wrong mid-point rule.</li>
      </ul>
