services:
  web:
    build:
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api

  api:
    environment:
      # Upstream docker-compose.yml doesn't forward these cloud-provider keys.
      # LearnDopamine Day 0-2 pivot: Groq primary, OpenAI fallback.
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # LearnDopamine UX pass: enable experimental features that UI expects.
      # Without these the course page fires a request that returns 500 and
      # showApiErrorToast surfaces the error to the user.
      ENABLE_EXPERIMENTAL_LECTOR: ${ENABLE_EXPERIMENTAL_LECTOR:-true}
      ENABLE_EXPERIMENTAL_LOOM: ${ENABLE_EXPERIMENTAL_LOOM:-false}
      # LearnDopamine Phase 11 — Code Runner. Backend submit_answer
      # accepts code_exercise type only when this flag is on.
      ENABLE_CODE_EXERCISES: ${ENABLE_CODE_EXERCISES:-true}
      # LearnDopamine Phase 12 — Hacking Labs (§34.6). Backend submit_answer
      # accepts lab_exercise type only when this flag is on. The Juice Shop
      # sibling container below starts regardless — infra stays up, route
      # gate is enforced at the API layer.
      ENABLE_HACKING_LABS: ${ENABLE_HACKING_LABS:-true}
      # LearnDopamine Phase 5 — Interviewer Agent grounds on content/
      # star_stories.md + code_defense_drill.md. The directory lives at the
      # repo root, outside apps/api, so we mount it and point the agent at
      # the mount via CONTENT_DIR (overrides the parents[] walk-up).
      CONTENT_DIR: ${CONTENT_DIR:-/app/content}
      # LearnDopamine Phase 8 — Voice transcription. Off by default so
      # /api/voice/transcribe stays behind a flag until OpenAI Whisper
      # usage is blessed; flip to true via .env.
      VOICE_ENABLED: ${VOICE_ENABLED:-true}
    volumes:
      # Phase 5: interviewer_prompts reads star_stories.md +
      # code_defense_drill.md from the OUTER repo's content/ directory
      # (Learn_Dofamine_project/content/, sibling of OpenTutor/). Mount
      # read-only so the container never mutates.
      - ../content:/app/content:ro

  # LearnDopamine Phase 12 T1 — Juice Shop target for hacking labs.
  # Independent of api/web/redis; no depends_on. First-start pull is ~800MB;
  # healthcheck uses 60s start_period because the Node process boots slowly.
  # Stateless per run — no volumes needed.
  juiceshop:
    image: bkimminich/juice-shop
    restart: unless-stopped
    ports:
      - "3100:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 30s
      start_period: 60s
